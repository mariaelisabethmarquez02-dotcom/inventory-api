services:

  frontend:
    build:
      context: ../inventario-frontend
      dockerfile: Dockerfile

    container_name: angular-frontend

    ports:
      - "4200:4200"

    volumes:
      - ../inventario-frontend:/app
      - /app/node_modules

    depends_on:
      - app

  app:
    build: .

    container_name: node-app

    ports:
      - "3000:3000"

    depends_on:
      - postgreSQL-server

    env_file:
      - .env

    volumes:
      - .:/app
      - /app/node_modules

  postgreSQL-server:
    image: postgres:15

    container_name: postgresql-container

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: inventario_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: